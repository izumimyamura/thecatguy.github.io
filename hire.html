<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE CAT GUY | Hire Onboarding Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="hire-portal-body">

    <nav class="navbar">
        <div class="logo">THE CATGUY</div>
        <div class="nav-controls">
            <div class="split-nav-container">
                <div class="split-master-btn">← RETURN TO TIMELINE</div>
                <div class="split-child-matrix">
                    <a href="index.html" class="child-node">Main Page</a>
                    <a href="index.html#showreel" class="child-node">Showreel</a>
                    <a href="index.html#portfolio" class="child-node">Selected Work</a>
                </div>
            </div>
        </div>
    </nav>

    <canvas id="stars"></canvas>
    <div class="cursor-glow" id="customCursor"></div>

    <!-- Onboarding Form Section -->
    <section class="onboarding-form-section">
        <div class="form-container-card">
            <h2>Let's Launch Your Project 🚀</h2>
            <p class="form-instructions-subtitle">Fill out your background data below. Submitting will launch an instant redirect straight to my Instagram DM chat hub!</p>
            
            <!-- FIXED: Intercepts submission pipeline cleanly using local form ID tracking handles -->
            <form id="clientIntakeForm" class="premium-intake-form">
                <div class="form-group-row">
                    <label>Your Name / Contact Officer</label>
                    <input type="text" id="clientNameInput" required placeholder="e.g., Alex Mercer" autocomplete="off">
                </div>

                <div class="form-group-row">
                    <label>Company / Studio Designation</label>
                    <input type="text" id="companyNameInput" required placeholder="e.g., Apex Media Studios" autocomplete="off">
                </div>

                <div class="form-group-row">
                    <label>Select Your Preferred Communications Channel</label>
                    <div class="channel-dropdown-wrapper">
                        <select id="contactChannelSelect" required>
                            <option value="" disabled selected>-- Choose Option --</option>
                            <option value="instagram">Instagram ID</option>
                            <option value="linkedin">LinkedIn Profile URL</option>
                            <option value="phone">Phone / WhatsApp Number</option>
                            <option value="email">Email Address</option>
                        </select>
                    </div>
                </div>

                <!-- FIXED: Initial field starts generic so it is immediately editable and never bugs out on mobile browsers -->
                <div class="form-group-row" id="dynamicInputGroup">
                    <label id="dynamicFieldLabel">Contact Handle Detail</label>
                    <input type="text" id="dynamicFieldInput" required placeholder="Select a channel above first..." autocomplete="off">
                </div>

                <button type="submit" class="form-submit-matrix-btn">SUBMIT TIMELINE REQUEST</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
